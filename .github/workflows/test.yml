name: Tests

on:
  push:
    branches:
      - next
      - main
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - next
      - main
    paths:
      - 'bin/**'
      - 'get-shit-done/**'
      - 'agents/**'
      - 'commands/**'
      - 'hooks/**'
      - 'tests/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Static lint: test-suite and PR-check contracts.
  # Runs once (not per matrix node version) since it is a file-content check.
  lint-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: true
          token: ${{ github.token }}
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 24
      - name: Lint — no source-grep tests
        shell: bash
        run: node scripts/lint-no-source-grep.cjs
      - name: Lint — test file count per module
        shell: bash
        run: node scripts/lint-test-file-count.cjs
      - name: Lint — command contract (ADR-0002)
        shell: bash
        run: node scripts/lint-command-contract.cjs
      - name: Lint — PR checks use projectDir
        shell: bash
        run: node scripts/lint-pr-check-project-dir.cjs

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      # fail-fast disabled so a single lane failure doesn't cancel the rest;
      # makes OS-specific vs version-specific regressions easier to distinguish.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2025]
        node-version: [22, 24]
        # Windows path/separator coverage is also reinforced by hardcoded-paths.test.cjs
        # and windows-robustness.test.cjs (static analysis).
        # A dedicated windows-compat workflow runs on a weekly schedule.

    steps:
      # Windows lane stays on checkout v4 for reliable auth/header behavior.
      # (v6's includeIf.gitdir flow has shown intermittent Windows auth drift.)
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 (Windows)
        if: runner.os == 'Windows'
        with:
          # Fetch full history so we can merge origin/main for stale-base detection.
          fetch-depth: 0
          persist-credentials: true
          token: ${{ github.token }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (Linux/macOS)
        if: runner.os != 'Windows'
        with:
          # Fetch full history so we can merge origin/main for stale-base detection.
          fetch-depth: 0
          persist-credentials: true
          token: ${{ github.token }}

      - name: Guard — require GitHub-hosted runner
        shell: bash
        run: |
          set -euo pipefail
          if [ "${RUNNER_ENVIRONMENT:-}" != "github-hosted" ]; then
            echo "::error::Expected github-hosted runner. RUNNER_ENVIRONMENT=${RUNNER_ENVIRONMENT:-unset}"
            exit 1
          fi

      # GitHub's `refs/pull/N/merge` is cached against the recorded merge-base.
      # Explicitly merge the PR base branch so tests run against the latest target.
      - name: Rebase check — merge PR base branch into PR head
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.email "ci@gsd-redux"
          git config user.name "CI Rebase Check"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          BASE_BRANCH="${GITHUB_BASE_REF:-main}"
          for attempt in 1 2 3; do
            if git fetch origin "$BASE_BRANCH"; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::git fetch origin $BASE_BRANCH failed after 3 attempts."
              exit 1
            fi
            sleep $((attempt * 4))
          done
          if ! git merge --no-edit --no-ff "origin/$BASE_BRANCH"; then
            echo "::error::This PR cannot cleanly merge origin/$BASE_BRANCH. Rebase your branch onto current $BASE_BRANCH and push again."
            echo "::error::Conflicting files:"
            git diff --name-only --diff-filter=U
            git merge --abort
            exit 1
          fi

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # Environment check - validates Node/npm version against engines constraints
      # and confirms package-lock.json is present before npm ci runs.
      # Catches env drift in CI itself (contributor parity check, issue #117).
      # Source: https://docs.npmjs.com/cli/v10/configuring-npm/package-json#engines
      - name: Environment check
        shell: bash
        run: npm run check:env

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Dependency integrity gate
        shell: bash
        run: |
          chmod +x scripts/check-npm-integrity.sh
          scripts/check-npm-integrity.sh

      # Split lanes (issue #3597). Unit is the fast default lane; integration
      # and security run alongside it on every PR. `install` and `slow` are
      # skipped on PR CI by design — they run on the weekly windows-compat
      # workflow and on `main` push only. See docs/TESTING-SUITES.md.
      - name: Run unit tests
        shell: bash
        run: npm run test:unit

      - name: Run integration tests
        shell: bash
        run: npm run test:integration

      - name: Run security tests
        shell: bash
        run: npm run test:security

      # Full-suite gates run on a single canonical lane to keep matrix cost bounded.
      # This ensures install + slow tests are always executed in PR CI.
      - name: Run install tests
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 24
        shell: bash
        run: npm run test:install

      - name: Run slow tests
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 24
        shell: bash
        run: npm run test:slow


  # Dedicated coverage job. Runs only on ubuntu/Node 24 (the canonical lane)
  # because c8 coverage of one suite on one OS is enough signal — running it
  # across the full matrix would 9x the cost for no extra coverage data.
  # Replaces main's per-matrix `Run tests with coverage` step.
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ github.token }}
      - name: Guard — require GitHub-hosted runner
        shell: bash
        run: |
          set -euo pipefail
          if [ "${RUNNER_ENVIRONMENT:-}" != "github-hosted" ]; then
            echo "::error::Expected github-hosted runner. RUNNER_ENVIRONMENT=${RUNNER_ENVIRONMENT:-unset}"
            exit 1
          fi
      - name: Rebase check — merge PR base branch into PR head
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.email "ci@gsd-redux"
          git config user.name "CI Rebase Check"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          BASE_BRANCH="${GITHUB_BASE_REF:-main}"
          for attempt in 1 2 3; do
            if git fetch origin "$BASE_BRANCH"; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::git fetch origin $BASE_BRANCH failed after 3 attempts."
              exit 1
            fi
            sleep $((attempt * 4))
          done
          if ! git merge --no-edit --no-ff "origin/$BASE_BRANCH"; then
            echo "::error::This PR cannot cleanly merge origin/$BASE_BRANCH. Rebase your branch onto current $BASE_BRANCH and push again."
            git merge --abort
            exit 1
          fi
      - name: Set up Node.js 24
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 24
          cache: 'npm'
      - name: Install dependencies
        shell: bash
        run: npm ci
      - name: Dependency integrity gate
        shell: bash
        run: |
          chmod +x scripts/check-npm-integrity.sh
          scripts/check-npm-integrity.sh
      - name: Unit coverage
        shell: bash
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: npm run test:coverage:unit
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-unit
          path: |
            coverage/
            .nyc_output/
          if-no-files-found: ignore
