name: PR Target Validator

# Enforce the branching model: only release/, hotfix/, fix/critical-, or
# automated back-merge branches may target `main`. Everything else must
# target `next`.
#
# Phase 1 mode: WARN_ONLY=true posts a friendly comment but doesn't fail
# the check. Flip to false in Phase 2 to enforce.
#
# See: docs/branching.md, docs/adr/230-introduce-next-integration-branch.md

# Trigger (#2331): pull_request_target, NOT pull_request. This job runs ONLY for
# non-OWNER/MEMBER/COLLABORATOR authors (see the `if:` below) — i.e. exactly the
# fork PRs whose `pull_request` GITHUB_TOKEN is downgraded to read-only
# regardless of the `permissions:` block. On that trigger the sticky-comment
# call below 403s, the unhandled rejection kills the step, and core.setFailed
# never runs: the author sees an API stack trace instead of "retarget to next".
# pull_request_target runs in the base-repo context with a write-capable token.
# Safe here (as in pr-template-format.yml): the only checkout is the BASE branch
# with persist-credentials: false, and the PR-controlled inputs (pr.base.ref /
# pr.head.ref) are read as data. No head code executes, so the "PR cannot edit
# the policy that judges it" property below is reinforced, not weakened.
on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate-target:
    # Maintainers may open internal release/backport coordination PRs against main.
    if: >-
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association) == false
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      # Phase-1: warn only. Phase-2: set to 'false' to enforce.
      WARN_ONLY: 'false'
    steps:
      - name: Checkout base branch (trusted policy source)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          persist-credentials: false

      - name: Validate PR target branch
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          WARN_ONLY: ${{ env.WARN_ONLY }}
        with:
          script: |
            const { classifyPrTarget } = require(`${process.env.GITHUB_WORKSPACE}/scripts/pr-target-policy.cjs`);

            const pr = context.payload.pull_request;
            const base = pr.base.ref;
            const head = pr.head.ref;
            const warnOnly = process.env.WARN_ONLY === 'true';

            const { decision } = classifyPrTarget(base, head);

            if (decision === 'allowed') {
              if (base === 'next') {
                core.info(`PR targets next — OK.`);
              } else if (base === 'main') {
                core.info(`PR from ${head} → main matches an allowed pattern.`);
              } else {
                core.info(`PR targets a release/hotfix branch — OK.`);
              }
              return;
            }

            if (decision === 'unusual') {
              core.warning(`Unusual PR target: ${base}`);
              return;
            }

            // decision === 'blocked': base is main and head is not an allowed pattern.
            const msg = [
              `### Wrong target branch`,
              ``,
              `This PR targets \`main\` but the source branch \`${head}\` is not a release, hotfix, critical-fix, or back-merge branch.`,
              ``,
              `**Most PRs should target \`next\`, not \`main\`.** See [docs/branching.md](../blob/main/docs/branching.md).`,
              ``,
              `**How to fix:** click "Edit" next to the PR title above and change the base branch from \`main\` to \`next\`. No need to recreate the PR.`,
              ``,
              `<details><summary>When IS it OK to target main?</summary>`,
              ``,
              `- \`release/X.Y.0\` branches (cut by \`release.yml\`)`,
              `- \`hotfix/X.Y.Z\` branches (cut by \`hotfix.yml\`)`,
              `- \`fix/critical-*\` branches (production-down emergencies)`,
              `- \`chore/backmerge-*\` branches (automated back-merge from this workflow)`,
              `- \`revert/critical-*\` branches (emergency reverts of a bad merge on main)`,
              ``,
              `</details>`,
            ].join('\n');

            // Post or update a sticky comment.
            //
            // #2331: the comment is a COURTESY, the verdict below is the GATE.
            // A failure here must never suppress the verdict. pull_request_target
            // should make the 403 impossible; this catch is defense in depth so a
            // future permission change degrades the diagnostic, not the gate.
            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
              });
              const marker = '<!-- pr-target-validator -->';
              const existing = comments.find(c => c.body && c.body.includes(marker));
              const body = `${marker}\n${msg}`;
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body,
                });
              }
            } catch (err) {
              core.warning(`Could not post the PR-target comment (${err.status || err.message}). Guidance follows:\n${msg}`);
            }

            if (warnOnly) {
              core.warning(`PR target mismatch (warning-only mode): ${head} → ${base}`);
            } else {
              core.setFailed(`PR target mismatch: ${head} should target next, not main.`);
            }
